<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="CSS/decorate.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>decorate the frame</title>
</head>

<body>
    <h1>Decorate Your Picture</h1>
<!-- picture iside frame, ready to be decorated -->
    <div class="main">
        <div class="tray-pannel">
            <div class="tray-container">
                <img id="tray" 
                src="Images/tray.jpeg"
                alt="sticker tray"> 

                <div class="deco-sticker">
                    <button id="01" class="sticker-button button-01"></button>
                    <button id="02" class="sticker-button button-02"></button>
                    <button id="03" class="sticker-button button-03"></button>
                    <button id="04" class="sticker-button button-04"></button>
                    <button id="05" class="sticker-button button-05"></button>
                    <button id="06" class="sticker-button button-06"></button>
                    <button id="07" class="sticker-button button-07"></button>
                    <button id="08" class="sticker-button button-08"></button>
                    <button id="09" class="sticker-button button-09"></button>
                    <button id="10" class="sticker-button button-10"></button>
                    <button id="12" class="sticker-button button-12"></button>
                    <button id="11" class="sticker-button button-11"></button>
                    <button id="13" class="sticker-button button-13"></button>
                    <button id="14" class="sticker-button button-14"></button>
                    <button id="15" class="sticker-button button-15"></button>
                    <button id="19" class="sticker-button button-19"></button>
                    <button id="20" class="sticker-button button-20"></button>
                    <button id="18" class="sticker-button button-18"></button>
                    <button id="16" class="sticker-button button-16"></button>
                    <button id="17" class="sticker-button button-17"></button>
                </div>
            </div>
        </div>
        
        <div class="canvas-container">
            <canvas id="finalCanvas"
                width="700"
                height="2100">
            </canvas>
        </div>

    </div>


<!-- Done button -->
<div class="buttons">
    <button id="download">Download</button>
    <button id="return">Return Home</button>
</div>


<script src="JS/decorate.js"></script>
</body>


    
</html>
